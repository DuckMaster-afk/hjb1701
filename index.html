	<script>
/* ---------------- CONFIG ---------------- */
const API_KEY = "AIzaSyAhBMTIqvgYXaFe7ADYpBFzxPkEeJ1tVps";
const CHANNEL_ID = "UC2-aS5D7OjnOJENooqdDw3Q";
const UPLOADS_PLAYLIST = "UU2-aS5D7OjnOJENooqdDw3Q";

/* ---------------- SUBSCRIBER COUNT ---------------- */

async function getSubscriberCount() {
  const url =
    `https://www.googleapis.com/youtube/v3/channels` +
    `?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.items && data.items.length > 0) {
      const subs = data.items[0].statistics.subscriberCount;
      document.getElementById("subCount").textContent =
        Number(subs).toLocaleString();

      /* ---- MILESTONE PROGRESS BAR ---- */
      const goal = 500; // your chosen milestone
      const percent = Math.min((subs / goal) * 100, 100);

      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("milestoneText").textContent =
        `${Number(subs).toLocaleString()} / ${goal.toLocaleString()}`;

    } else {
      document.getElementById("subCount").textContent = "N/A";
    }
  } catch (error) {
    document.getElementById("subCount").textContent = "Error";
    console.error(error);
  }
}

getSubscriberCount();
setInterval(getSubscriberCount, 4800000);


/* ---------------- LATEST SHORT FETCH ---------------- */

async function getLatestShort() {
  try {
    const playlistUrl =
      `https://www.googleapis.com/youtube/v3/playlistItems` +
      `?part=contentDetails` +
      `&playlistId=${UPLOADS_PLAYLIST}` +
      `&maxResults=10` +
      `&key=${API_KEY}`;

    const playlistRes = await fetch(playlistUrl);
    const playlistData = await playlistRes.json();

    if (!playlistData.items) return null;

    const videoIds = playlistData.items.map(i => i.contentDetails.videoId);

    const videoUrl =
      `https://www.googleapis.com/youtube/v3/videos` +
      `?part=contentDetails,snippet` +
      `&id=${videoIds.join(",")}` +
      `&key=${API_KEY}`;

    const videoRes = await fetch(videoUrl);
    const videoData = await videoRes.json();

    if (!videoData.items) return null;

    for (const video of videoData.items) {
      const details = video.contentDetails;
      const snippet = video.snippet;

      const match = details.duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
      const minutes = match?.[1] ? parseInt(match[1]) : 0;
      const seconds = match?.[2] ? parseInt(match[2]) : 0;
      const totalSeconds = minutes * 60 + seconds;

      const thumb = snippet.thumbnails.default;
      if (totalSeconds <= 180) {
        return video.id;
      }
    }

    return null;

  } catch (err) {
    console.error("Error fetching latest short:", err);
    return null;
  }
}

/* ---------------- YOUTUBE IFRAME API ---------------- */

// Load the IFrame API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

let player = null;

// Called automatically when the API is ready
function onYouTubeIframeAPIReady() {
  getLatestShort().then(videoId => {
    if (!videoId) {
      console.error("No short found.");
      return;
    }

    player = new YT.Player('latestshort', {
      height: '480',
      width: '270',
      videoId: videoId,
      playerVars: { playsinline: 1 }
    });
  });
}
</script>
